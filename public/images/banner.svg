<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="codeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1100" cy="320" r="150" fill="rgba(255,255,255,0.04)"/>
  <circle cx="900" cy="60" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="200" cy="350" r="60" fill="rgba(255,255,255,0.03)"/>
  <!-- Code bracket decoration left -->
  <text x="60" y="200" font-family="monospace" font-size="120" fill="rgba(255,255,255,0.08)" font-weight="bold">{</text>
  <!-- Code bracket decoration right -->
  <text x="1080" y="260" font-family="monospace" font-size="120" fill="rgba(255,255,255,0.08)" font-weight="bold">}</text>
  <!-- Floating code snippets -->
  <g opacity="0.12" fill="#fff" font-family="monospace" font-size="14">
    <text x="80" y="130">const learn = () =&gt; {</text>
    <text x="80" y="150">  return success;</text>
    <text x="80" y="170">};</text>
    <text x="900" y="100">import { Future } from</text>
    <text x="900" y="120">  &quot;codinginvent&quot;;</text>
    <text x="950" y="340">// build &amp; deploy</text>
    <text x="160" y="330">async function grow()</text>
  </g>
  <!-- Laptop illustration -->
  <g transform="translate(780, 100)">
    <!-- Laptop screen -->
    <rect x="0" y="0" width="200" height="130" rx="8" fill="#1e1b4b" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <!-- Screen content: code lines -->
    <rect x="16" y="16" width="60" height="6" rx="3" fill="#818cf8"/>
    <rect x="84" y="16" width="40" height="6" rx="3" fill="#fbbf24"/>
    <rect x="16" y="30" width="80" height="6" rx="3" fill="#34d399"/>
    <rect x="104" y="30" width="50" height="6" rx="3" fill="#94a3b8"/>
    <rect x="16" y="44" width="50" height="6" rx="3" fill="#f472b6"/>
    <rect x="74" y="44" width="70" height="6" rx="3" fill="#818cf8"/>
    <rect x="30" y="58" width="90" height="6" rx="3" fill="#34d399"/>
    <rect x="30" y="72" width="60" height="6" rx="3" fill="#fbbf24"/>
    <rect x="98" y="72" width="40" height="6" rx="3" fill="#f472b6"/>
    <rect x="30" y="86" width="70" height="6" rx="3" fill="#94a3b8"/>
    <rect x="16" y="100" width="40" height="6" rx="3" fill="#818cf8"/>
    <!-- Laptop base -->
    <path d="M-20,130 L220,130 L200,150 L0,150 Z" fill="#312e81" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
  <!-- Rocket icon -->
  <g transform="translate(730, 80)" opacity="0.9">
    <text font-size="48">🚀</text>
  </g>
  <!-- Dotted grid pattern -->
  <g opacity="0.06" fill="#fff">
    <circle cx="300" cy="50" r="2"/><circle cx="340" cy="50" r="2"/><circle cx="380" cy="50" r="2"/><circle cx="420" cy="50" r="2"/>
    <circle cx="300" cy="90" r="2"/><circle cx="340" cy="90" r="2"/><circle cx="380" cy="90" r="2"/><circle cx="420" cy="90" r="2"/>
    <circle cx="300" cy="130" r="2"/><circle cx="340" cy="130" r="2"/><circle cx="380" cy="130" r="2"/><circle cx="420" cy="130" r="2"/>
  </g>
</svg>
