<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="340" cy="50" r="90" fill="rgba(255,255,255,0.05)"/>
  <circle cx="50" cy="190" r="70" fill="rgba(255,255,255,0.04)"/>
  <!-- Java coffee cup icon -->
  <g transform="translate(165, 40)">
    <rect x="15" y="30" width="40" height="50" rx="4" fill="none" stroke="#fff" stroke-width="3"/>
    <path d="M55,50 Q70,50 70,60 Q70,70 55,70" fill="none" stroke="#fff" stroke-width="3"/>
    <rect x="10" y="82" width="50" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <!-- Steam -->
    <path d="M25,28 Q28,18 25,8" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <path d="M35,28 Q38,15 35,5" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <path d="M45,28 Q48,18 45,8" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
  </g>
  <text x="200" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" opacity="0.9">Java</text>
  <!-- Tech tags -->
  <g font-size="12" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="30" y="170" width="90" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="75" y="186">Spring Boot</text>
    <rect x="130" y="170" width="80" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="170" y="186">Hibernate</text>
    <rect x="220" y="170" width="100" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="270" y="186">Microservices</text>
    <rect x="330" y="170" width="50" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="355" y="186">JUnit</text>
  </g>
  <text x="200" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="2">ENTERPRISE DEVELOPMENT</text>
