<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="330" cy="40" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="80" cy="210" r="60" fill="rgba(255,255,255,0.04)"/>
  <!-- .NET logo style -->
  <g transform="translate(200, 95)" text-anchor="middle">
    <rect x="-48" y="-38" width="96" height="76" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text y="-5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" opacity="0.6">.NET</text>
    <text y="18" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff">C#</text>
  </g>
  <!-- Tech tags -->
  <g font-size="12" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="20" y="170" width="90" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="65" y="186">ASP.NET</text>
    <rect x="120" y="170" width="70" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="155" y="186">Entity</text>
    <rect x="200" y="170" width="60" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="230" y="186">Azure</text>
    <rect x="270" y="170" width="60" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="300" y="186">Blazor</text>
    <rect x="340" y="170" width="45" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="362" y="186">API</text>
  </g>
  <text x="200" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="2">FULL STACK WITH C#</text>
</svg>
