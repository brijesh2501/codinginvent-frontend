<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="330" cy="40" r="100" fill="rgba(255,255,255,0.04)"/>
  <circle cx="60" cy="210" r="80" fill="rgba(255,255,255,0.03)"/>
  <!-- AI Brain icon -->
  <g transform="translate(160, 20)">
    <!-- Brain outline -->
    <circle cx="40" cy="45" r="38" fill="none" stroke="url(#brain)" stroke-width="2.5"/>
    <!-- Neural network nodes -->
    <circle cx="25" cy="30" r="5" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="55" cy="30" r="5" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="40" cy="18" r="5" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="20" cy="50" r="5" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="60" cy="50" r="5" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="40" cy="55" r="5" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="30" cy="70" r="5" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="50" cy="70" r="5" fill="#c4b5fd" opacity="0.8"/>
    <!-- Connections -->
    <line x1="25" y1="30" x2="55" y2="30" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="18" x2="25" y2="30" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="18" x2="55" y2="30" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="25" y1="30" x2="20" y2="50" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="55" y1="30" x2="60" y2="50" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="25" y1="30" x2="40" y2="55" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="55" y1="30" x2="40" y2="55" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="50" x2="30" y2="70" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="60" y1="50" x2="50" y2="70" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="55" x2="30" y2="70" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="55" x2="50" y2="70" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>
    <!-- Sparkle dots -->
    <circle cx="8" cy="20" r="2" fill="#fbbf24" opacity="0.6"/>
    <circle cx="72" cy="15" r="2" fill="#fbbf24" opacity="0.6"/>
    <circle cx="5" cy="65" r="2" fill="#fbbf24" opacity="0.6"/>
    <circle cx="75" cy="60" r="2" fill="#fbbf24" opacity="0.6"/>
  </g>
  <text x="200" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff" opacity="0.9">Generative AI</text>
  <text x="200" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">LLM &amp; Prompt Engineering</text>
  <!-- Tech tags -->
  <g font-size="12" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="15" y="165" width="75" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="52" y="181">OpenAI</text>
    <rect x="100" y="165" width="82" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="141" y="181">LangChain</text>
    <rect x="192" y="165" width="50" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="217" y="181">RAG</text>
    <rect x="252" y="165" width="65" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="285" y="181">Vectors</text>
    <rect x="327" y="165" width="60" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="357" y="181">Tuning</text>
  </g>
  <text x="200" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="2">LLM APPLICATIONS</text>
</svg>
