<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="330" cy="50" r="90" fill="rgba(255,255,255,0.05)"/>
  <circle cx="60" cy="200" r="70" fill="rgba(255,255,255,0.04)"/>
  <!-- MERN stack blocks -->
  <g transform="translate(110, 35)">
    <!-- M - MongoDB -->
    <rect x="0" y="0" width="80" height="50" rx="8" fill="#116149" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="40" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4ade80">M</text>
    <text x="40" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">MongoDB</text>
    <!-- E - Express -->
    <rect x="90" y="0" width="80" height="50" rx="8" fill="#116149" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="130" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fbbf24">E</text>
    <text x="130" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">Express</text>
    <!-- R - React -->
    <rect x="0" y="60" width="80" height="50" rx="8" fill="#116149" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="40" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#61dafb">R</text>
    <text x="40" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">React</text>
    <!-- N - Node -->
    <rect x="90" y="60" width="80" height="50" rx="8" fill="#116149" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="130" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#68a063">N</text>
    <text x="130" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">Node.js</text>
  </g>
  <text x="200" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" opacity="0.9">MERN Stack</text>
  <!-- Tech tags -->
  <g font-size="12" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="40" y="170" width="70" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="75" y="186">MongoDB</text>
    <rect x="120" y="170" width="65" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="152" y="186">React</text>
    <rect x="195" y="170" width="65" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="228" y="186">Node.js</text>
    <rect x="270" y="170" width="58" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="299" y="186">JWT</text>
    <rect x="338" y="170" width="48" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="362" y="186">API</text>
  </g>
  <text x="200" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="2">FULL STACK MASTERY</text>
</svg>
