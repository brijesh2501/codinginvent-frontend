<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="320" cy="40" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="60" cy="200" r="60" fill="rgba(255,255,255,0.04)"/>
  <!-- PHP logo -->
  <ellipse cx="200" cy="105" rx="70" ry="42" fill="#232531" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="200" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#8892BF">php</text>
  <!-- Tech icons -->
  <g font-size="13" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="65" y="170" width="70" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="100" y="186">Laravel</text>
    <rect x="145" y="170" width="60" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="175" y="186">MySQL</text>
    <rect x="215" y="170" width="74" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="252" y="186">REST API</text>
    <rect x="299" y="170" width="52" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="325" y="186">OOP</text>
  </g>
  <!-- Label -->
  <text x="200" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="2" text-transform="uppercase">FULL STACK DEVELOPMENT</text>
</svg>
